<div class="container">
  <h2>Login</h2>
  <form (ngSubmit)="Login(formulario)" #formulario="ngForm">
    <input type="email" name="email" ngModel placeholder="Correo" required>
    <input type="password" name="password" ngModel placeholder="Contraseña" required>
    <button type="submit">Ingresar</button>
  </form>
</div>
